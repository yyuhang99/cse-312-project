<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" type="text/css" href="/static/css/main.css" />
  <link rel="shortcut icon" type="image/x-icon" href="/static/favicon.ico" />
  <title>Comment Section</title>
</head>
<body>
  <div class="main">
    <div class="nav-bar">
      <div class="left-nav">
        <a href="index.html">
          <img src="" alt="Yappers Logo" />🗣️
        </a>
        <h1>Yappers</h1>
      </div>
      <div class="right-nav">
        <h3 class="username">{{Username}}</h3>
        <img class="avatar" src="/static/img/Profile-Avatar-PNG-Picture.png" alt="User Avatar" />
        <div class="logout">
          <form action="/logout" method="post" enctype="application/x-www-form-urlencoded">
            <input type="submit" value="Logout" />
          </form>
        </div>
      </div>
    </div>
    <div class="feed">
      <div class="post-main">
        <div class="create-post">
          <div class="create-header">
            <img id="post-avatar" class="avatar" src="/static/img/Profile-Avatar-PNG-Picture.png" alt="User Avatar" />
            <h3 class="username">{{Username}}</h3>
          </div>
          <div class="chat-form">
            <hr>
            <label>
                Chat:
                <input id="chat-text-box" type="text">
                <input id="xsrf" value={{xsrf_token}} name="xsrf_token" hidden>
            </label>
            <button id="post-button" onclick="sendPost()">Post</button>
        </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="/public/static/function.js"></script>
</body>
</html>
